project: <project-name>
version: 1
objective: >
  Replace this with the product mission and primary technical workflow.

global_standards:
  architecture: explicit-boundaries
  code_quality:
    - structured
    - professional
    - testable
    - documented
    - contract-driven
  mandatory_outputs:
    - clear_scope
    - explicit_assumptions
    - verification_step
    - residual_risk

workflow:
  - agent: orchestrator
    purpose: analyzes the task, impact, risks, and ownership
  - agent: architecture-agent
    purpose: validates boundaries, contracts, and dependency direction
  - agent: code-analysis-agent
    purpose: audits non-obvious functional, duplication, and maintainability risks
  - agent: implementation-agent
    purpose: implements product behavior changes
  - agent: prompt-agent
    purpose: adjusts prompts, schemas, and AI behavior when applicable
  - agent: qa-agent
    purpose: covers tests, mocks, observability, and regressions
  - agent: documentation-agent
    purpose: reviews and synchronizes documentation

context_layers:
  - layer: root
    files:
      - AGENTS.md
      - README.md
      - project-objective.md
  - layer: standards
    files:
      - standards/coding-standards.md
      - standards/repository-operating-guide.md
  - layer: topology
    files:
      - .agents/README.md
      - .agents/topology.yaml
  - layer: fast-tasks
    files:
      - fast-tasks/AGENTS.md
    activation_policy: exact-message lightweight recurring tasks that are not rules or skills
  - layer: roles
    files:
      - .agents/roles/orchestrator.md
      - .agents/roles/architecture-agent.md
      - .agents/roles/code-analysis-agent.md
      - .agents/roles/implementation-agent.md
      - .agents/roles/prompt-agent.md
      - .agents/roles/qa-agent.md
      - .agents/roles/documentation-agent.md
  - layer: rules
    files:
      - .agents/rules/README.md
      - .agents/rules/001-protect-dev-and-main.md
      - .agents/rules/002-task-worktree-flow.md
      - .agents/rules/003-architecture-boundaries.md
      - .agents/rules/004-environment-configuration.md
      - .agents/rules/005-code-quality.md
      - .agents/rules/006-testing-and-observability.md
      - .agents/rules/007-prompt-contracts.md
      - .agents/rules/008-git-and-github-safety.md
      - .agents/rules/009-sensitive-file-access.md
      - .agents/rules/010-task-folder-naming.md
  - layer: skills
    files:
      - .agents/skills/proj-doc-sync/SKILL.md
      - .agents/skills/proj-architecture-refactor/SKILL.md
      - .agents/skills/proj-feature-change/SKILL.md
      - .agents/skills/proj-prompt-hardening/SKILL.md
      - .agents/skills/proj-qa-observability/SKILL.md
      - .agents/skills/proj-task-spec-authoring/SKILL.md
  - layer: templates
    files:
      - .agents/templates/base-agent-prompt.md
      - .agents/templates/agent-generation-template.md
      - .agents/templates/feature-implementation-prompt.md
      - .agents/templates/architecture-review-prompt.md
      - .agents/templates/qa-regression-prompt.md
      - .agents/templates/prompt-contract-review.md

agents:
  - id: orchestrator
    file: .agents/roles/orchestrator.md
    owns:
      - cross-cutting decisions
      - task decomposition
      - acceptance criteria
  - id: architecture-agent
    file: .agents/roles/architecture-agent.md
    owns:
      - boundaries
      - contracts
      - dependency direction
  - id: code-analysis-agent
    file: .agents/roles/code-analysis-agent.md
    owns:
      - senior code reviews
      - functional risks
      - duplication and confusing workflows
      - maintainability findings
  - id: implementation-agent
    file: .agents/roles/implementation-agent.md
    owns:
      - use cases
      - product behavior
      - implementation notes
  - id: prompt-agent
    file: .agents/roles/prompt-agent.md
    owns:
      - prompts
      - structured outputs
      - AI fail-safe behavior
  - id: qa-agent
    file: .agents/roles/qa-agent.md
    owns:
      - tests
      - mocks
      - debug traces
  - id: documentation-agent
    file: .agents/roles/documentation-agent.md
    owns:
      - docs
      - architecture notes
      - AI-base synchronization

skills:
  - id: proj-doc-sync
    file: .agents/skills/proj-doc-sync/SKILL.md
    purpose: reviews and synchronizes documentation
  - id: proj-architecture-refactor
    file: .agents/skills/proj-architecture-refactor/SKILL.md
    purpose: reviews architecture and proposes safe refactors
  - id: proj-feature-change
    file: .agents/skills/proj-feature-change/SKILL.md
    purpose: implements or debugs product behavior
  - id: proj-prompt-hardening
    file: .agents/skills/proj-prompt-hardening/SKILL.md
    purpose: improves prompts, schemas, parsing, and AI fallbacks
  - id: proj-qa-observability
    file: .agents/skills/proj-qa-observability/SKILL.md
    purpose: strengthens tests, mocks, and observability
  - id: proj-task-spec-authoring
    file: .agents/skills/proj-task-spec-authoring/SKILL.md
    purpose: drafts task specifications and execution prompts

rules:
  - id: protect-dev-and-main
    file: .agents/rules/001-protect-dev-and-main.md
    purpose: defines optional protected branch confirmation policy
  - id: task-worktree-flow
    file: .agents/rules/002-task-worktree-flow.md
    purpose: defines optional isolated worktree flow
  - id: architecture-boundaries
    file: .agents/rules/003-architecture-boundaries.md
    purpose: preserves project architecture and dependency direction
  - id: environment-configuration
    file: .agents/rules/004-environment-configuration.md
    purpose: centralizes runtime configuration and private value handling
  - id: code-quality
    file: .agents/rules/005-code-quality.md
    purpose: defines maintainability and responsibility standards
  - id: testing-and-observability
    file: .agents/rules/006-testing-and-observability.md
    purpose: defines proportionate verification and diagnostics
  - id: prompt-contracts
    file: .agents/rules/007-prompt-contracts.md
    purpose: treats AI prompts, schemas, parsers, and fallbacks as contracts when applicable
  - id: git-and-github-safety
    file: .agents/rules/008-git-and-github-safety.md
    purpose: requires command-risk analysis and recoverability safeguards
  - id: sensitive-file-access
    file: .agents/rules/009-sensitive-file-access.md
    purpose: forbids accessing paths whose file or directory name contains secret
  - id: task-folder-naming
    file: .agents/rules/010-task-folder-naming.md
    purpose: defines optional naming for durable generated task artifacts

templates:
  - id: base-agent-prompt
    file: .agents/templates/base-agent-prompt.md
    purpose: base prompt for project agents
  - id: agent-generation-template
    file: .agents/templates/agent-generation-template.md
    purpose: guide for creating new agent guides or skills
  - id: feature-implementation-prompt
    file: .agents/templates/feature-implementation-prompt.md
    purpose: reusable prompt for product behavior changes
  - id: architecture-review-prompt
    file: .agents/templates/architecture-review-prompt.md
    purpose: reusable prompt for boundary and refactor reviews
  - id: qa-regression-prompt
    file: .agents/templates/qa-regression-prompt.md
    purpose: reusable prompt for tests, fixtures, replay, and observability
  - id: prompt-contract-review
    file: .agents/templates/prompt-contract-review.md
    purpose: reusable prompt for AI prompt, schema, parser, and fallback contract reviews
